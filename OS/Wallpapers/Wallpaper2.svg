<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="grad1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#3333ff"/>
    </radialGradient>

    <radialGradient id="grad2" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#0099ff"/>
    </radialGradient>

    <radialGradient id="grad3" cx="70%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#6600ff"/>
    </radialGradient>

    <!-- Flou doux -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="80"/>
    </filter>

    <!-- Texture liquide (bruit pour réfraction) -->
    <filter id="liquidNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" seed="8" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="20" result="softNoise"/>
    </filter>

    <!-- Réfraction (effet loupe) -->
    <filter id="refraction">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="warp"/>
      <feDisplacementMap in="SourceGraphic" in2="warp" scale="80" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Overlay verre -->
    <radialGradient id="glassOverlay" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- Fond -->
  <rect width="1920" height="1080" fill="#0a0a0f"/>

  <!-- Formes fluides -->
  <g filter="url(#blur)" opacity="0.9">
    <ellipse cx="700" cy="400" rx="500" ry="300" fill="url(#grad1)"/>
    <ellipse cx="1400" cy="700" rx="600" ry="350" fill="url(#grad2)"/>
    <ellipse cx="1100" cy="300" rx="450" ry="250" fill="url(#grad3)"/>
  </g>

  <!-- Texture interne subtile -->
  <rect width="1920" height="1080" filter="url(#liquidNoise)" opacity="0.05"/>

  <!-- Couche verre -->
  <rect width="1920" height="1080" fill="url(#glassOverlay)"/>

  <!-- Glow central -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>

  <circle cx="960" cy="540" r="500" fill="url(#centerGlow)"/>
</svg>