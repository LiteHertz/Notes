<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <radialGradient id="grad1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#3333ff"/>
    </radialGradient>

    <radialGradient id="grad2" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#0099ff"/>
    </radialGradient>

    <radialGradient id="grad3" cx="70%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#6600ff"/>
    </radialGradient>

    <!-- Flou doux global -->
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>

    <!-- Flou bord -->
    <filter id="edgeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>

    <!-- Effet verre (diffusion lumineuse) -->
    <radialGradient id="glassOverlay" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- Fond sombre -->
  <rect width="1920" height="1080" fill="#0a0a0f"/>

  <!-- HALO FLOU LARGE -->
  <g filter="url(#edgeBlur)" opacity="0.6">
    <ellipse cx="700" cy="400" rx="650" ry="420" fill="url(#grad1)"/>
    <ellipse cx="1400" cy="700" rx="750" ry="450" fill="url(#grad2)"/>
    <ellipse cx="1100" cy="300" rx="600" ry="350" fill="url(#grad3)"/>
  </g>

  <!-- FORMES PRINCIPALES (adoucies) -->
  <g filter="url(#softBlur)" opacity="0.85">
    <ellipse cx="700" cy="400" rx="480" ry="280" fill="url(#grad1)"/>
    <ellipse cx="1400" cy="700" rx="560" ry="320" fill="url(#grad2)"/>
    <ellipse cx="1100" cy="300" rx="430" ry="250" fill="url(#grad3)"/>
    <ellipse cx="400" cy="800" rx="500" ry="300" fill="#ff0099" opacity="0.7"/>
  </g>

  <!-- Couche verre dépoli -->
  <rect width="1920" height="1080" fill="url(#glassOverlay)"/>

  <!-- Glow central -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>

  <circle cx="960" cy="540" r="520" fill="url(#centerGlow)"/>
</svg>